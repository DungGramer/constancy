name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
        exclude:
          - os: windows-latest
            node: 20
          - os: macos-latest
            node: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node == 22
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build & Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check bundle size
        run: |
          ESM_SIZE=$(wc -c < dist/index.js)
          CJS_SIZE=$(wc -c < dist/index.cjs)
          echo "ESM: ${ESM_SIZE} bytes | CJS: ${CJS_SIZE} bytes"
          if [ "$ESM_SIZE" -gt 15000 ]; then
            echo "::warning::ESM bundle exceeds 15KB ($ESM_SIZE bytes)"
          fi

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
      - run: semgrep scan --config p/typescript --config p/security-audit --sarif -o semgrep.sarif src/
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: aquasecurity/trivy-action@master
        with:
          token: ${{ github.token }}
          scan-type: fs
          scanners: vuln,secret
          format: sarif
          output: trivy.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy
