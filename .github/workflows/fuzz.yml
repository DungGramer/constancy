name: Fuzz

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz-deep-freeze
          - fuzz-immutable-view
          - fuzz-tamper-evident
          - fuzz-snapshot
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run fuzzer (${{ matrix.target }})
        run: npx jazzer fuzz/${{ matrix.target }}.js --timeout=60 -- -max_total_time=120
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        if: failure()
        with:
          name: crash-${{ matrix.target }}
          path: |
            crash-*
            .cifuzz-corpus/
