name: Publish (SLSA 3)

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  # Run CI tests before building.
  # - Elevate permissions so nested semgrep/trivy jobs can upload SARIF.
  # - secrets: inherit required — reusable workflows don't auto-receive caller
  #   secrets, so SONAR_TOKEN / CODECOV_TOKEN would otherwise be empty.
  ci:
    permissions:
      contents: read
      security-events: write
    secrets: inherit
    uses: ./.github/workflows/ci.yml

  # SLSA 3 isolated build — generates provenance attestation
  build:
    needs: [ci]
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_nodejs_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      # SLSA v2.1.0 builder does NOT auto-install deps — 'ci' script maps to
      # 'npm ci' (defined in package.json) so devDependencies (tsup) are
      # available when 'build' runs inside the SLSA VM.
      run-scripts: "ci, build"
      node-version: 22

  # Publish with SLSA provenance to npm
  publish:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: slsa-framework/slsa-github-generator/actions/nodejs/publish@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
        with:
          access: public
          node-auth-token: ${{ secrets.NPM_TOKEN }}
          package-name: ${{ needs.build.outputs.package-name }}
          package-download-name: ${{ needs.build.outputs.package-download-name }}
          package-download-sha256: ${{ needs.build.outputs.package-download-sha256 }}
          provenance-name: ${{ needs.build.outputs.provenance-name }}
          provenance-download-name: ${{ needs.build.outputs.provenance-download-name }}
          provenance-download-sha256: ${{ needs.build.outputs.provenance-download-sha256 }}
