<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3c82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left column lock icon (centered in 0..400 column, y-centered ~315) -->
  <!-- Lock body: 160x120, centered at x=200, y=340 -->
  <rect x="120" y="340" width="160" height="120" rx="18" fill="#fff"/>
  <!-- Lock shackle: arc from 140..260, top=180, mid=340 -->
  <path d="M140 340v-70a60 60 0 0 1 120 0v70" fill="none" stroke="#fff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Keyhole circle -->
  <circle cx="200" cy="396" r="20" fill="#3c82f6"/>
  <!-- Keyhole slot -->
  <rect x="190" y="396" width="20" height="32" rx="10" fill="#3c82f6"/>

  <!-- Right 2/3 text block: x from 440 to 1140 -->
  <!-- Title: constancy -->
  <text x="460" y="255"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="120" font-weight="700" fill="#fff" dominant-baseline="auto">constancy</text>

  <!-- Tagline -->
  <text x="462" y="320"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="40" font-weight="400" fill="rgba(255,255,255,0.9)">Immutability primitives for JavaScript</text>

  <!-- Meta line -->
  <text x="462" y="378"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28" font-weight="400" fill="rgba(255,255,255,0.7)">5 models · zero deps · SLSA 3 · MIT</text>

  <!-- Bottom-right URL -->
  <text x="1160" y="610"
    font-family="'Courier New', Courier, ui-monospace, monospace"
    font-size="22" font-weight="400" fill="rgba(255,255,255,0.6)"
    text-anchor="end">dunggramer.github.io/constancy</text>

  <!-- Top-right v3 badge -->
  <rect x="1108" y="28" width="64" height="34" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="1140" y="51"
    font-family="Inter, system-ui, sans-serif"
    font-size="20" font-weight="600" fill="rgba(255,255,255,0.75)"
    text-anchor="middle">v3</text>
</svg>
